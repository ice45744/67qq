kind = "web"
previewPath = "/"
title = "ร้านอาหาร POS"
version = "1.0.0"
id = "artifacts/pos-restaurant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24861

[services.development]
run = "pnpm --filter @workspace/pos-restaurant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pos-restaurant", "run", "build" ]
publicDir = "artifacts/pos-restaurant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24861"
BASE_PATH = "/"
